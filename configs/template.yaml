# YOLOv8 训练配置模板
# 用法：复制此模板并根据实验需求修改

# 模型配置
model: yolov8n  # yolov8n/s/m/l/x 或自定义模型
data: datasets/coco.yaml  # 数据集配置

# 训练参数
epochs: 100
batch: 16
imgsz: 640
device: 0  # GPU ID 或 cpu

# 优化器
optimizer: SGD  # SGD, Adam, AdamW
lr0: 0.01  # 初始学习率
lrf: 0.1  # 最终学习率 (lr0 * lrf)
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# 学习率调度器
scheduler: cosine  # linear, cosine, auto

# 数据增强
hsv_h: 0.015  # 色调增强
hsv_s: 0.7  # 饱和度增强
hsv_v: 0.4  # 亮度增强
degrees: 0.0  # 旋转角度
translate: 0.1  # 平移
scale: 0.5  # 缩放
shear: 0.0  # 剪切
perspective: 0.0  # 透视
flipud: 0.0  # 垂直翻转概率
fliplr: 0.5  # 水平翻转概率
mosaic: 1.0  # Mosaic 增强概率
mixup: 0.0  # MixUp 增强概率
copy_paste: 0.0  # Copy-Paste 增强概率

# Anchor boxes (自动锚点时可设为 null)
anchors: null  # 自动锚点
# 或自定义锚点:
# anchors:
#   - [10,13, 16,30, 33,23]  # P3/8
#   - [30,61, 62,45, 59,119]  # P4/16
#   - [116,90, 156,198, 373,326]  # P5/32

# 正则化
dropout: 0.0  # Dropout 比率
label_smoothing: 0.0  # 标签平滑

# 恢复训练
resume: false  # 从检查点恢复
pretrained: true  # 使用预训练权重

# 日志和保存
project: runs/detect
name: exp_001  # 实验名称
exist_ok: false  # 是否覆盖现有实验
save: true
save_period: -1  # 每隔多少 epoch 保存一次 (-1 仅保存最佳)
verbose: true

# 多 GPU 训练
# device: 0,1,2,3

# 超参数进化 (可选)
# evolve: true
# cache: ~/.config/Ultralytics/bb
