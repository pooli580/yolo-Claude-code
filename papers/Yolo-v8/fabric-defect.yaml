# 织物缺陷检测数据集配置
# 用法：yolo train model=yolov8s-strip.yaml data=fabric-defect.yaml

# 数据集根目录 (请根据实际情况修改为绝对路径或相对路径)
path: datasets/fabric-defect

# 训练集和验证集目录 (相对于 path)
train: images/train
val: images/val
# test: images/test  # 可选

# 类别数量
nc: 6

# 类别名称 (请根据实际缺陷类型修改)
names:
  0: hole           # 破洞
  1: stain          # 污渍
  2: weft_skew      # 纬斜
  3: missing_yarn   # 缺纱
  4: oil_spot       # 油斑
  5: broken_warp    # 断经

# -----------------------------------------------------------
# 数据集准备说明:
#
# 1. 目录结构:
#    datasets/fabric-defect/
#    ├── images/
#    │   ├── train/     # 训练图片
#    │   └── val/       # 验证图片
#    └── labels/
#        ├── train/     # 训练标注 (.txt)
#        └── val/       # 验证标注 (.txt)
#
# 2. YOLO 标注格式 (每行一个目标):
#    <class-id> <x_center> <y_center> <width> <height>
#    - class-id: 类别 ID (0-nc-1)
#    - 坐标均为归一化值 (0-1 之间)
#
# 3. 示例标注文件 (defect_001.txt):
#    0 0.45 0.52 0.08 0.06    # 破洞
#    1 0.72 0.38 0.12 0.15    # 污渍
#    2 0.25 0.67 0.05 0.20    # 纬斜
# -----------------------------------------------------------
